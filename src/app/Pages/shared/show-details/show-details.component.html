<div class="card">
  <p-toast />
  <p-toolbar styleClass="mb-4 gap-2">
    <ng-template pTemplate="left">
      <p-button
        severity="success"
        label="New"
        icon="pi pi-plus"
        class="mr-2"
        (onClick)="openNew.emit()"
      />
      <p-button
        severity="danger"
        label="Delete"
        icon="pi pi-trash"
        [disabled]="!selectedData || !selectedData.length"
      />
    </ng-template>

    <ng-template pTemplate="right">
      <p-fileUpload
        mode="basic"
        accept="image/*"
        [maxFileSize]="1000000"
        label="Import"
        chooseLabel="Import"
        class="mr-2 inline-block"
      />
      <p-button severity="help" label="Export" icon="pi pi-upload" />
    </ng-template>
  </p-toolbar>

  <p-table
    #dt
    [value]="allData"
    [rows]="10"
    [paginator]="true"
    [globalFilterFields]="[
      'name',
      'country.name',
      'representative.name',
      'status',
    ]"
    [tableStyle]="{ 'min-width': '75rem' }"
    [(selection)]="selectedData"
    [rowHover]="true"
    dataKey="id"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
    [showCurrentPageReport]="true"
  >
    <ng-template pTemplate="caption">
      <div class="flex align-items-center justify-content-between">
        <h5 class="m-0">Manage {{ title }}</h5>
      </div>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 4rem">
          <p-tableHeaderCheckbox />
        </th>
        <th pSortableColumn="brandName" style="min-width: 15rem">
          brand Name <p-sortIcon field="brandName" />
        </th>
        <th>brand Image</th>
        <th pSortableColumn="description">
          Description <p-sortIcon field="description" />
        </th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-data>
      <tr>
        <td>
          <p-tableCheckbox [value]="data" />
        </td>
        <td>
          {{ data[config.fieldName] }}
        </td>
        <td>
          <img
            [src]="data[config.imageFieldName]"
            [alt]="data[config.fieldName]"
            width="150"
            class="shadow-4"
          />
        </td>
        <td>
          {{ data[config.descriptionFieldName] }}
        </td>
        <td>
          <p-button
            icon="pi pi-pencil"
            class="mr-2"
            [rounded]="true"
            [outlined]="true"
            severity="success"
            (onClick)="editData.emit(data)"
          />
          <p-button
            icon="pi pi-trash"
            severity="danger"
            [rounded]="true"
            [outlined]="true"
            (onClick)="deleteData.emit(data)"
          />
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog
    [(visible)]="dataDialog"
    [style]="{ width: '600px' }"
    [header]="title + ' Details'"
    [modal]="true"
    styleClass="p-fluid"
    (onHide)="hideDialog.emit()"
  >
    <ng-template pTemplate="content">
      <!-- Edit Image -->
      <div class="fluid text-center">
        @if (imagePreview || data[config.imageFieldName]) {
          <img
            [src]="imagePreview || data[config.imageFieldName]"
            [alt]="data.logo"
            class="block m-auto pb-3"
            width="250"
          />
        } @else {
          <p>there is no image to show</p>
        }
        <input
          type="file"
          #inputFile
          hidden
          accept="image/*"
          (change)="onImageSelected.emit($event)"
        />
        <p-button
          (click)="inputFile.click()"
          type="button"
          label="Upload Image"
          icon="pi pi-upload"
        ></p-button>
      </div>
      <!-- Edit Name -->
      <div class="field mt-5">
        <label for="name">{{ title }} Name</label>
        <input
          type="text"
          pInputText
          id="name"
          [(ngModel)]="data[config.fieldName]"
          required
          autofocus
        />
        <small class="p-error" *ngIf="submitted && !data[config.fieldName]">
          Name is required.
        </small>
      </div>
      <!-- Edit Description -->
      <div class="field">
        <label for="description">Description</label>
        <textarea
          id="description"
          pInputTextarea
          [(ngModel)]="data[config.descriptionFieldName]"
          required
          rows="3"
          cols="20"
        >
        </textarea>
      </div>
    </ng-template>

    <ng-template pTemplate="footer">
      <p-button
        label="Cancel"
        icon="pi pi-times"
        [text]="true"
        (onClick)="hideDialog.emit()"
      />
      <p-button
        label="Save"
        icon="pi pi-check"
        [text]="true"
        (onClick)="saveData.emit()"
      />
    </ng-template>
  </p-dialog>

  <p-confirmDialog [style]="{ width: '450px' }" />
</div>
