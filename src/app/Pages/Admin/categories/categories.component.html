<div class="card">
  <p-toast />
  <p-toolbar styleClass="mb-4 gap-2">
    <ng-template pTemplate="left">
      <p-button
        severity="success"
        label="New"
        icon="pi pi-plus"
        class="mr-2"
        (onClick)="openNew()"
      />
      <p-button
        severity="danger"
        label="Delete"
        icon="pi pi-trash"
        [disabled]="!selectedCategory || !selectedCategory.length"
      />
    </ng-template>
    <!-- (onClick)="deleteSelectedCategory()"  -->

    <ng-template pTemplate="right">
      <p-fileUpload
        mode="basic"
        accept="image/*"
        [maxFileSize]="1000000"
        label="Import"
        chooseLabel="Import"
        class="mr-2 inline-block"
      />
      <p-button severity="help" label="Export" icon="pi pi-upload" />
    </ng-template>
  </p-toolbar>

  <p-table
    #dt
    [value]="categories"
    [rows]="10"
    [paginator]="true"
    [globalFilterFields]="[
      'name',
      'country.name',
      'representative.name',
      'status',
    ]"
    [tableStyle]="{ 'min-width': '75rem' }"
    [(selection)]="selectedCategory"
    [rowHover]="true"
    dataKey="id"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
    [showCurrentPageReport]="true"
  >
    <ng-template pTemplate="caption">
      <div class="flex align-items-center justify-content-between">
        <h5 class="m-0">Manage Categories</h5>
      </div>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 4rem">
          <p-tableHeaderCheckbox />
        </th>
        <th pSortableColumn="categoryName" style="min-width: 15rem">
          Category Name <p-sortIcon field="categoryName" />
        </th>
        <th>Category Image</th>
        <th pSortableColumn="description">
          Description <p-sortIcon field="description" />
        </th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-category>
      <tr>
        <td>
          <p-tableCheckbox [value]="category" />
        </td>
        <td>
          {{ category.categoryName }}
        </td>
        <td>
          <img
            [src]="category.image"
            [alt]="category.categoryName"
            width="150"
            class="shadow-4"
          />
        </td>
        <td>
          {{ category.description }}
        </td>
        <td>
          <p-button
            icon="pi pi-pencil"
            class="mr-2"
            [rounded]="true"
            [outlined]="true"
            severity="success"
            (onClick)="editCategory(category)"
          />
          <p-button
            icon="pi pi-trash"
            severity="danger"
            [rounded]="true"
            [outlined]="true"
            (onClick)="deleteCategory(category)"
          />
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog
    [(visible)]="categoryDialog"
    [style]="{ width: '600px' }"
    header="Category Details"
    [modal]="true"
    styleClass="p-fluid"
    (onHide)="hideDialog()"
  >
    <ng-template pTemplate="content">
      <!-- Edit Image -->
      <div class="fluid text-center">
        @if (imagePreview || category.image) {
          <img
            [src]="imagePreview || category.image"
            [alt]="category.image"
            class="block m-auto pb-3"
            width="250"
          />
        } @else {
          <p>there is no image to show</p>
        }
        <input
          type="file"
          #inputFile
          hidden
          accept="image/*"
          (change)="onImageSelected($event)"
        />
        <p-button
          (click)="inputFile.click()"
          type="button"
          label="Upload Image"
          icon="pi pi-upload"
        ></p-button>
      </div>
      <!-- Edit Name -->
      <div class="field mt-5">
        <label for="name">Category Name</label>
        <input
          type="text"
          pInputText
          id="name"
          [(ngModel)]="category.categoryName"
          required
          autofocus
        />
        <small class="p-error" *ngIf="submitted && !category.categoryName">
          Name is required.
        </small>
      </div>
      <!-- Edit Description -->
      <div class="field">
        <label for="description">Description</label>
        <textarea
          id="description"
          pInputTextarea
          [(ngModel)]="category.description"
          required
          rows="3"
          cols="20"
        >
        </textarea>
      </div>
    </ng-template>

    <ng-template pTemplate="footer">
      <p-button
        label="Cancel"
        icon="pi pi-times"
        [text]="true"
        (onClick)="hideDialog()"
      />
      <p-button
        label="Save"
        icon="pi pi-check"
        [text]="true"
        (onClick)="saveProduct()"
      />
    </ng-template>
  </p-dialog>

  <p-confirmDialog [style]="{ width: '450px' }" />
</div>
