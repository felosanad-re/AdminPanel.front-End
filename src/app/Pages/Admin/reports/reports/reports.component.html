<app-invoice-reports-show
  [allData]="reports"
  [data]="report"
  [onReportItems]="reportItems"
  [onExpandedRows]="expandedRows"
  [onPageName]="pageName"
  (onCollapseAll)="collapseAll()"
  (onExpandAll)="expandAll()"
  (onDelete)="deleteReport($event)"
  (onPrint)="printReport($event)"
  (onRowExpand)="onRowExpand($event)"
  (onRowCollapse)="onRowCollapse($event)"
  (onExportHandler)="onExportReports()"
  (onImportHandler)="onImportReports($event)"
/>
