<div class="container p-5">
  <!-- Card -->
  <div class="grid">
    @for (item of items; track $index) {
      <div class="col-12 sm:col-6 md:col-4">
        <p-card [header]="item.label">
          <p class="m-0">{{ item.title }}</p>
        </p-card>
      </div>
    }

    @defer (on viewport; prefetch on idle) {
      <div class="col-12">
        <div class="card flex justify-content-center">
          <p>Select Data To Show Details</p>
          <p-calendar
            [(ngModel)]="rangeDates"
            selectionMode="range"
            [readonlyInput]="true"
            (onSelect)="onDateSelect()"
          />
        </div>
        <!-- Charts -->
        <div class="card h-full border-1">
          <h2>{{ charts.title }}</h2>

          <p-chart
            [type]="charts.type"
            [data]="charts.data"
            [options]="charts.options"
          />
        </div>
      </div>
    } @placeholder {
      <div class="col-12 md:col-8">
        <div class="card h-full border-1 surface-100 p-4">
          <div class="skeleton h-4rem w-8rem mb-3 bg-200"></div>
          <div class="skeleton h-20rem w-full bg-200"></div>
        </div>
      </div>
    }
  </div>
</div>
